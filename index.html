    <style>
      body {
        font-family: 'Poppins', sans-serif;
      }
      .font-pixel {
        font-family: 'Press Start 2P', cursive;
      }
      .bubbles-bg {
        background: linear-gradient(135deg, #b9fbc0, #98fb98, #a8ff78, #74c759, #228b22);
        background-size: 400% 400%;
        animation: gradient-animation 15s ease infinite;
        overflow: hidden;
        position: relative;
      }
      @keyframes gradient-animation {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      .bubble {
        position: absolute;
        bottom: -150px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 50%;
        opacity: 0.5;
        animation: rise 25s infinite ease-in;
        z-index: 0;
      }
      @keyframes rise {
        0% {
          transform: translateY(0) scale(1);
        }
        100% {
          transform: translateY(-120vh) scale(0.5);
        }
      }

      /* Custom slider styles for glowy effect */
      .glowing-slider {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        background: transparent; /* Make default track transparent */
        cursor: pointer;
        height: 24px; /* Give it some vertical space to avoid clipping thumb shadows */
      }
      .glowing-slider:disabled {
        cursor: not-allowed;
      }

      /* --- Webkit (Chrome, Safari, Edge) --- */
      .glowing-slider::-webkit-slider-runnable-track {
        width: 100%;
        height: 8px;
        background: linear-gradient(to right, #93c5fd, #3b82f6 var(--progress-percent, 0%), #e5e7eb var(--progress-percent, 0%), #e5e7eb 100%);
        border-radius: 9999px;
      }
      .glowing-slider:disabled::-webkit-slider-runnable-track {
        background: linear-gradient(to right, #d1d5db, #9ca3af var(--progress-percent, 0%), #e5e7eb var(--progress-percent, 0%), #e5e7eb 100%);
      }

      .glowing-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        margin-top: -4px; /* (16px thumb height - 8px track height) / 2 */
        height: 16px;
        width: 16px;
        background: #ffffff;
        border-radius: 50%;
        border: 2px solid #3b82f6;
        box-shadow: 0 0 4px rgba(59, 130, 246, 0.5);
      }
       .glowing-slider:disabled::-webkit-slider-thumb {
        background: #9ca3af;
        border-color: #6b7280;
       }

      /* --- Firefox --- */
      .glowing-slider::-moz-range-track {
        width: 100%;
        height: 8px;
        background: #e5e7eb; /* The unfilled part */
        border-radius: 9999px;
      }
      .glowing-slider:disabled::-moz-range-track {
        background: #e5e7eb;
      }

      .glowing-slider::-moz-range-progress {
        height: 8px;
        background: linear-gradient(to right, #93c5fd, #3b82f6);
        border-radius: 9999px;
        box-shadow: 0 0 5px #60a5fa, 0 0 10px #60a5fa;
      }
      .glowing-slider:disabled::-moz-range-progress {
        background: linear-gradient(to right, #d1d5db, #9ca3af);
        box-shadow: none;
      }

      .glowing-slider::-moz-range-thumb {
        height: 16px;
        width: 16px;
        background: #ffffff;
        border-radius: 50%;
        border: 2px solid #3b82f6;
        box-shadow: 0 0 4px rgba(59, 130, 246, 0.5);
      }
      .glowing-slider:disabled::-moz-range-thumb {
        background: #9ca3af;
        border-color: #6b7280;
      }
    </style>
